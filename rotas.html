<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0913" />
<link rel="stylesheet" href="styles.css" />
<title>Audens Route — Rotas</title>
<style>
  .agstats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .agstat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:140px;}
  .agstat .n{font-size:22px;font-weight:800;} .agstat .l{font-size:11.5px;color:var(--dim);margin-top:2px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip2{border:1px solid var(--line);background:var(--card);color:var(--dim);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .chip2.on{background:linear-gradient(90deg,#7c3aed,#a855f7);border:none;color:#fff;}
  .rt{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;background:var(--card);}
  .rt .h{display:flex;align-items:center;gap:9px;margin-bottom:9px;} .rt .h b{font-size:14px;} .rt .h .badge{font-size:11px;font-weight:700;border-radius:999px;padding:4px 11px;margin-left:auto;}
  .bg-amber{background:rgba(245,181,68,.15);color:var(--amber);} .bg-cyan{background:rgba(34,211,238,.15);color:#22d3ee;} .bg-green{background:rgba(52,211,153,.15);color:var(--green);} .bg-faint{background:var(--card2);color:var(--faint);}
  .pills{margin-bottom:9px;} .pills .pill{display:inline-block;background:var(--card2);border-radius:6px;padding:2px 8px;margin:2px 4px 0 0;font-size:11.5px;}
  .rmeta{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-bottom:8px;} .rmeta b{color:var(--text);}
  .timeline{display:flex;gap:6px;font-size:10.5px;color:var(--faint);flex-wrap:wrap;}
  .timeline span b{color:var(--dim);}
  .rt .foot{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .mini{border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:8px;padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer;} .mini.g{background:linear-gradient(90deg,#7c3aed,#a855f7);border:none;color:#fff;} .mini.d{color:var(--faint);background:none;border:none;} .mini.d:hover{color:var(--red);}
  .sw{width:38px;height:22px;border-radius:999px;background:#3a3f4b;position:relative;transition:.2s;cursor:pointer;flex-shrink:0;} .sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;} .sw.on{background:var(--green);} .sw.on::after{left:18px;}
  .auto{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:16px;}
  .auto .t{font-size:13px;font-weight:700;} .auto .s{font-size:11.5px;color:var(--faint);}
</style>
</head>
<body>
<template id="page">
  <div class="page-head" style="display:flex;align-items:flex-start"><div><h1>Rotas</h1><p>Acompanhe todas as rotas: montadas, despachadas, em entrega e concluídas.</p></div>
    <button class="btn" style="margin-left:auto" onclick="load()">↻ Atualizar</button></div>
  <div class="auto">
    <div><div class="t">Despacho automático</div><div class="s">Quando ligado, cada rota criada vai direto para o 1º motoboy da fila (sem clique).</div></div>
    <div class="sw" id="autoSw" onclick="toggleAuto()" style="margin-left:auto"></div>
  </div>
  <section class="agstats" id="stats"></section>
  <div class="chips" id="chips"></div>
  <div id="list"></div>
</template>

<script>window.PAGE='rotas';</script>
<script src="config.js" onerror="window.AUDENS_CONFIG=window.AUDENS_CONFIG||{}"></script>
<script src="app.js"></script>
<script>
const {api,H,setConn,toast}=AudensShell;
let routes=[],orderMap={},filter='todas',auto=false;
const ST={approved:['Aguardando despacho','bg-amber'],sent_to_driver:['Enviada ao motoboy','bg-cyan'],accepted_by_driver:['Aceita','bg-cyan'],in_progress:['Em entrega','bg-cyan'],finished:['Concluída','bg-green'],canceled:['Cancelada','bg-faint']};
const isToday=(iso)=>{if(!iso)return false;const d=new Date(iso),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();};
const hhmm=(iso)=>{if(!iso)return '—';const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};

function renderStats(){
  const c=(f)=>routes.filter(f).length;
  document.getElementById('stats').innerHTML=`
    <div class="agstat"><div class="n">${c(r=>r.status==='approved')}</div><div class="l">Aguardando despacho</div></div>
    <div class="agstat"><div class="n">${c(r=>['sent_to_driver','accepted_by_driver','in_progress'].includes(r.status))}</div><div class="l">Em andamento</div></div>
    <div class="agstat"><div class="n">${c(r=>r.status==='finished'&&isToday(r.finishedAt))}</div><div class="l">Concluídas hoje</div></div>
    <div class="agstat"><div class="n">${routes.length}</div><div class="l">Total (recentes)</div></div>`;
}
function renderChips(){
  const opts=[['todas','Todas'],['aguardando','Aguardando'],['andamento','Em andamento'],['concluidas','Concluídas']];
  document.getElementById('chips').innerHTML=opts.map(o=>`<div class="chip2 ${filter===o[0]?'on':''}" onclick="setFilter('${o[0]}')">${o[1]}</div>`).join('');
}
function match(r){
  if(filter==='aguardando')return r.status==='approved';
  if(filter==='andamento')return ['sent_to_driver','accepted_by_driver','in_progress'].includes(r.status);
  if(filter==='concluidas')return r.status==='finished';
  return true;
}
function render(){
  const box=document.getElementById('list');
  const list=routes.filter(match);
  if(!list.length){ box.innerHTML=`<div class="card-b" style="text-align:center;color:var(--faint)">Nenhuma rota aqui.</div>`; return; }
  box.innerHTML=list.map(r=>{
    const [txt,cls]=ST[r.status]||[r.status,'bg-faint'];
    const pills=(r.orders||[]).map(id=>{const o=orderMap[id];return `<span class="pill">#${o?(o.displayId||o.externalOrderId):id.slice(-5)}</span>`;}).join('');
    const moto=r.driverName?`🛵 <b>${r.driverName}</b>`:'sem motoboy';
    const dist=r.totalDistanceKm!=null?String(r.totalDistanceKm).replace('.',',')+' km':'—';
    const acts=r.status==='approved'?`<button class="mini g" onclick="despachar('${r.id}')">Despachar p/ fila</button><button class="mini d" onclick="desfazer('${r.id}')">desfazer</button>`:'';
    return `<div class="rt">
      <div class="h"><b>${(r.neighborhoods||[]).join(', ')||'Rota'}</b><span class="badge ${cls}">${txt}</span></div>
      <div class="pills">${pills}</div>
      <div class="rmeta"><span>${moto}</span><span>${(r.orderCount||0)} pedidos</span><span>${dist}</span><span>Valor: <b>${H.money(r.totalValue)}</b></span></div>
      <div class="timeline"><span><b>Criada</b> ${hhmm(r.createdAt)}</span><span>·</span><span><b>Despachada</b> ${hhmm(r.assignedAt)}</span><span>·</span><span><b>Concluída</b> ${hhmm(r.finishedAt)}</span></div>
      ${acts?`<div class="foot">${acts}</div>`:''}
    </div>`;
  }).join('');
}
function setFilter(f){ filter=f; renderChips(); render(); }
async function despachar(id){ try{ const r=await api.assignNext(id); toast('Despachada para '+(r.assignedTo||'o próximo')+'!'); load(); }catch(e){ toast('Erro: '+e.message); } }
async function desfazer(id){ if(!confirm('Desfazer esta rota?'))return; try{ await api.delRoute(id); toast('Rota desfeita'); load(); }catch(e){ toast('Erro: '+e.message); } }
async function toggleAuto(){ try{ auto=!auto; document.getElementById('autoSw').classList.toggle('on',auto); await api.patchSettings({autoDispatch:auto}); toast(auto?'Despacho automático LIGADO':'Despacho automático desligado'); }catch(e){ toast('Erro'); auto=!auto; } }

async function load(){
  if(!api.hasBackend){setConn('err');return;}
  try{
    const [rt,or_,cfg]=await Promise.all([api.allRoutes().catch(()=>[]),api.orders().catch(()=>[]),api.getSettings().catch(()=>({}))]);
    routes=Array.isArray(rt)?rt:[]; orderMap={}; (Array.isArray(or_)?or_:[]).forEach(o=>orderMap[o.id]=o);
    auto=!!(cfg&&cfg.autoDispatch); document.getElementById('autoSw').classList.toggle('on',auto);
    setConn('live');
  }catch(e){ setConn('err'); }
  renderStats(); renderChips(); render();
}
load(); setInterval(load,7000);
</script>
</body>
</html>
