<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f1115" />
<title>Audens Route — Painel Operacional</title>
<style>
  :root {
    --bg:#0f1115; --surface:#171a21; --surface-2:#1e222b; --border:#2a2f3a;
    --text:#e7ebf0; --text-dim:#9aa4b2; --text-faint:#6b7484;
    --accent:#4f8cff; --green:#34c77b; --amber:#f5a524; --red:#f2545b; --purple:#9b7dff;
    --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.25);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;}
  header{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:16px;
    padding:12px 20px; background:rgba(15,17,21,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--purple));
    display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;}
  .brand h1{font-size:15px;margin:0;line-height:1.1;}
  .brand span{font-size:12px;color:var(--text-dim);}
  .spacer{flex:1;}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;
    background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text-faint);}
  .pill.live .dot{background:var(--green);box-shadow:0 0 0 0 rgba(52,199,123,.6);animation:pulse 2s infinite;}
  .pill.error .dot{background:var(--red);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,199,123,.5)}70%{box-shadow:0 0 0 7px rgba(52,199,123,0)}100%{box-shadow:0 0 0 0 rgba(52,199,123,0)}}
  .btn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);padding:8px 10px;border-radius:9px;
    font-size:13px;cursor:pointer;font-weight:600;transition:background .15s;}
  .btn:hover{background:#262b36;}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:18px 20px 4px;}
  @media (max-width:900px){.kpis{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:520px){.kpis{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .kpi .n{font-size:26px;font-weight:750;letter-spacing:-.5px;}
  .kpi .l{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .kpi .n.accent{color:var(--accent);} .kpi .n.green{color:var(--green);}
  .kpi .n.amber{color:var(--amber);} .kpi .n.purple{color:var(--purple);}

  .board{display:grid;grid-template-columns:repeat(6,minmax(220px,1fr));gap:14px;padding:16px 20px 40px;overflow-x:auto;align-items:start;}
  .col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-height:120px;}
  .col-bar{height:3px;border-radius:3px 3px 0 0;}
  .col-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
  .col-head .name{font-size:13px;font-weight:700;}
  .col-head .count{margin-left:auto;font-size:12px;font-weight:700;color:var(--text-dim);background:var(--surface-2);
    border-radius:999px;padding:2px 9px;min-width:24px;text-align:center;}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:10px;max-height:68vh;overflow-y:auto;}
  .empty{color:var(--text-faint);font-size:12.5px;text-align:center;padding:18px 8px;}

  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;box-shadow:var(--shadow);animation:rise .25s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .store{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
  .store .sdot{width:9px;height:9px;border-radius:50%;}
  .oid{margin-left:auto;font-weight:750;font-size:13.5px;}
  .row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);margin:3px 0;}
  .row .k{color:var(--text-faint);}
  .card-foot{display:flex;align-items:center;gap:8px;margin-top:9px;}
  .total{font-weight:700;font-size:13px;color:var(--text);}
  .badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px;}
  .badge.normal{background:rgba(154,164,178,.15);color:var(--text-dim);}
  .badge.attention{background:rgba(245,165,36,.16);color:var(--amber);}
  .badge.high{background:rgba(242,84,91,.16);color:var(--red);}
  .time{font-size:11.5px;color:var(--text-faint);}
  .act{margin-left:auto;border:none;cursor:pointer;font-weight:700;font-size:12px;padding:6px 11px;border-radius:8px;color:#fff;background:var(--accent);}
  .act.green{background:var(--green);}

  .banner{margin:16px 20px 0;padding:14px 16px;border-radius:var(--radius);background:rgba(242,84,91,.10);
    border:1px solid rgba(242,84,91,.3);color:#ffb3b6;font-size:13px;display:none;}
  .banner.show{display:block;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);
    color:var(--text);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">A</div>
    <div>
      <h1>Audens Route</h1>
      <span>Painel Operacional</span>
    </div>
  </div>
  <div class="spacer"></div>
  <div id="statusPill" class="pill"><span class="dot"></span><span id="statusText">Conectando…</span></div>
  <a class="btn" href="cardapios.html" style="text-decoration:none;">Cardápios</a>
  <button class="btn" id="refreshBtn" title="Atualizar agora">↻ Atualizar</button>
</header>

<div class="banner" id="banner"></div>
<section class="kpis" id="kpis"></section>
<main class="board" id="board"></main>
<div class="toast" id="toast"></div>

<script src="config.js" onerror="window.AUDENS_CONFIG=window.AUDENS_CONFIG||{}"></script>
<script>
/* ============================================================
   Audens Route — Painel de pedidos
   Fonte única: o backend (que recebe o webhook do cardápio web).
   ============================================================ */
const CFG = window.AUDENS_CONFIG || {};
const API_URL = CFG.apiUrl || '';

const COLUMNS = [
  { id:'recebido',   name:'Recebido',               color:'#4f8cff', statuses:['received','confirmed'] },
  { id:'preparo',    name:'Em preparo',             color:'#f5a524', statuses:['preparing'] },
  { id:'pronto',     name:'Pronto',                 color:'#34c77b', statuses:['ready'] },
  { id:'agrupando',  name:'Aguardando agrupamento', color:'#9b7dff', statuses:['waiting_grouping','grouped'] },
  { id:'rota',       name:'Em rota',                color:'#4fd0e0', statuses:['waiting_driver','sent_to_driver','accepted_by_driver','out_for_delivery','arrived_at_customer'] },
  { id:'entregue',   name:'Entregue',               color:'#7a869a', statuses:['delivered'] },
];
const STATUS_LABEL = {
  received:'Recebido', confirmed:'Confirmado', preparing:'Em preparo', ready:'Pronto',
  waiting_grouping:'Aguardando agrupamento', grouped:'Agrupado', waiting_driver:'Aguardando motoboy',
  sent_to_driver:'Enviado ao motoboy', accepted_by_driver:'Aceito', out_for_delivery:'Saiu p/ entrega',
  arrived_at_customer:'Chegou no cliente', delivered:'Entregue', canceled:'Cancelado', order_error:'Erro'
};
const NEXT_ACTION = {
  received:  { to:'preparing', label:'Iniciar preparo', cls:'' },
  confirmed: { to:'preparing', label:'Iniciar preparo', cls:'' },
  preparing: { to:'ready',     label:'Marcar pronto',   cls:'green' },
};
function storeColor(name){const n=(name||'').toLowerCase();if(n.includes('burg'))return '#f5a524';if(n.includes('pizz'))return '#f2545b';return '#7a869a';}

let orders = [];
let pollTimer = null;

function colOfStatus(s){return COLUMNS.find(c=>c.statuses.includes(s));}
function fmtMoney(v){return 'R$ '+(Number(v)||0).toFixed(2).replace('.',',');}
function relTime(iso){
  if(!iso) return '';
  const diff = Math.max(0, Math.floor((Date.now()-new Date(iso).getTime())/60000));
  if(diff<1) return 'agora'; if(diff<60) return diff+' min';
  const h=Math.floor(diff/60); return h+'h'+String(diff%60).padStart(2,'0');
}
function setStatus(kind,text){const p=document.getElementById('statusPill');p.className='pill '+kind;document.getElementById('statusText').textContent=text;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

function render(){
  const count=(sts)=>orders.filter(o=>sts.includes(o.status)).length;
  const kpis=[
    {n:orders.length,l:'Pedidos ativos',c:'accent'},
    {n:count(['received','confirmed']),l:'Recebidos',c:''},
    {n:count(['preparing']),l:'Em preparo',c:'amber'},
    {n:count(['ready','waiting_grouping','grouped']),l:'Prontos',c:'green'},
    {n:count(['waiting_driver','sent_to_driver','accepted_by_driver','out_for_delivery','arrived_at_customer']),l:'Em rota',c:'purple'},
    {n:count(['delivered']),l:'Entregues',c:''},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="n ${k.c}">${k.n}</div><div class="l">${k.l}</div></div>`).join('');

  document.getElementById('board').innerHTML=COLUMNS.map(col=>{
    const items=orders.filter(o=>(colOfStatus(o.status)||{}).id===col.id);
    const cards=items.length?items.map(cardHTML).join(''):`<div class="empty">sem pedidos</div>`;
    return `<div class="col"><div class="col-bar" style="background:${col.color}"></div>
      <div class="col-head"><span class="name">${col.name}</span><span class="count">${items.length}</span></div>
      <div class="col-body">${cards}</div></div>`;
  }).join('');
}
function cardHTML(o){
  const sc=storeColor(o.storeName||o.storeType);
  const risk=o.riskLevel||'normal';
  const bairro=(o.address&&o.address.neighborhood)||'—';
  const act=NEXT_ACTION[o.status];
  const actBtn=act?`<button class="act ${act.cls}" onclick="advance('${o.id}','${act.to}')">${act.label}</button>`:'';
  return `<div class="card">
    <div class="card-top"><span class="store"><span class="sdot" style="background:${sc}"></span>${o.storeName||'—'}</span><span class="oid">#${o.externalOrderId||'?'}</span></div>
    <div class="row"><span class="k">Bairro</span> ${bairro}</div>
    <div class="row"><span class="time">⏱ ${relTime(o._statusSince||o.readyAt||o.preparingAt||o.createdAt)} em ${STATUS_LABEL[o.status]||o.status}</span></div>
    <div class="card-foot"><span class="total">${fmtMoney(o.total)}</span><span class="badge ${risk}">${risk==='normal'?'ok':risk}</span>${actBtn}</div>
  </div>`;
}

async function advance(id,to){
  try{
    const r=await fetch(`${API_URL}/api/orders/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:to})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||('HTTP '+r.status));}
    toast('Status atualizado'); fetchOrders();
  }catch(err){ toast('Erro: '+err.message); }
}

async function fetchOrders(){
  if(!API_URL){
    setStatus('error','Backend não configurado');
    document.getElementById('banner').classList.add('show');
    document.getElementById('banner').textContent='O endereço do backend não está configurado (config.js → apiUrl). Sem ele, o painel não recebe os pedidos.';
    return;
  }
  try{
    const r=await fetch(`${API_URL}/api/orders`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    orders=Array.isArray(data)?data:[];
    setStatus('live','Conectado');
    document.getElementById('banner').classList.remove('show');
    render();
  }catch(err){
    setStatus('error','Sem conexão com o backend');
  }
}

document.getElementById('refreshBtn').onclick=()=>{ fetchOrders(); toast('Atualizado'); };
setInterval(()=>{ if(orders.length) render(); }, 30000); // atualiza os "tempos"

// start — modo único: lê do backend a cada 4s
render();            // mostra o quadro (colunas vazias) de imediato
fetchOrders();
pollTimer=setInterval(fetchOrders, 4000);
</script>
</body>
</html>
