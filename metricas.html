<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0913" />
<link rel="stylesheet" href="styles.css" />
<title>Audens Route — Métricas</title>
<style>
  .mhead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .mhead .sp{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
  .seg button{border:none;background:none;color:var(--dim);font-size:12px;font-weight:700;padding:7px 13px;border-radius:8px;cursor:pointer;}
  .seg button.on{background:linear-gradient(90deg,#7c3aed,#a855f7);color:#fff;}
  .kpirow{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px;}
  @media(max-width:1200px){.kpirow{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:640px){.kpirow{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;position:relative;overflow:hidden;}
  .kpi .top{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);font-weight:600;line-height:1.25;min-height:28px;}
  .kpi .ic{width:26px;height:26px;border-radius:8px;background:rgba(139,92,246,.16);color:var(--violet3);display:grid;place-items:center;flex-shrink:0;} .kpi .ic svg{width:15px;height:15px;}
  .kpi .val{font-size:26px;font-weight:800;margin:9px 0 4px;line-height:1;}
  .kpi .foot{display:flex;align-items:center;gap:8px;}
  .kpi .dl{font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:3px;} .kpi .dl.up{color:var(--green);} .kpi .dl.down{color:var(--red);} .kpi .dl.flat{color:var(--faint);}
  .kpi .dl small{font-weight:600;color:var(--faint);}
  .kpi .spk{margin-left:auto;opacity:.9;}
  .cmp{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start;}
  @media(max-width:1100px){.cmp{grid-template-columns:1fr;}}
  .col-l{display:grid;gap:16px;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;} @media(max-width:760px){.g2{grid-template-columns:1fr;}}
  .g21{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;} @media(max-width:760px){.g21{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;}
  .card h2{font-size:14px;margin:0 0 4px;display:flex;align-items:center;gap:8px;} .card .csub{font-size:11px;color:var(--faint);margin:0 0 12px;}
  .card h2 .rt{margin-left:auto;font-size:11px;color:var(--faint);font-weight:600;}
  .legend{display:flex;flex-direction:column;gap:12px;justify-content:center;}
  .legend .li{display:flex;align-items:center;gap:9px;font-size:12px;} .legend .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;} .legend b{font-size:14px;} .legend span{color:var(--faint);font-size:11px;}
  table.at{width:100%;border-collapse:collapse;} table.at th{font-size:10.5px;color:var(--faint);font-weight:700;text-align:left;padding:6px 6px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.03em;} table.at td{font-size:12.5px;padding:9px 6px;border-bottom:1px solid var(--line);} table.at td.r{text-align:right;} table.at .dl{color:var(--red);font-weight:800;}
  .store{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .store .sh{display:flex;align-items:center;gap:11px;margin-bottom:12px;} .store .lg{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#1c1730;} .store .lg img{width:100%;height:100%;object-fit:cover;}
  .store .nm{font-size:14px;font-weight:800;} .store .ty{font-size:10.5px;color:var(--faint);} .store .ac{font-size:10px;color:var(--green);display:inline-flex;align-items:center;gap:4px;margin-top:2px;} .store .ac .d{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .store .mr{display:flex;align-items:baseline;justify-content:space-between;padding:7px 0;border-top:1px solid var(--line);} .store .mr:first-of-type{border-top:none;}
  .store .mk{font-size:11.5px;color:var(--dim);} .store .mv{font-size:13.5px;font-weight:800;display:flex;align-items:baseline;gap:8px;}
  .dl2{font-size:10.5px;font-weight:800;} .dl2.up{color:var(--green);} .dl2.down{color:var(--red);} .dl2.flat{color:var(--faint);}
  .ins{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-top:1px solid var(--line);} .ins:first-of-type{border-top:none;}
  .ins .ii{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;} .ins .it{font-size:12.5px;font-weight:800;} .ins .is{font-size:11.5px;color:var(--dim);margin-top:2px;line-height:1.4;}
  .empty{color:var(--faint);font-size:12.5px;text-align:center;padding:22px;}
  svg text{font-family:inherit;}
</style>
</head>
<body>
<template id="page">
  <div class="mhead">
    <div><h1 style="margin:0">Métricas e performance</h1><p style="margin:4px 0 0;color:var(--dim);font-size:13px">Acompanhe os principais indicadores operacionais.</p></div>
    <div class="sp">
      <div class="seg" id="seg"><button data-d="7" class="on" onclick="setDays(7)">7 dias</button><button data-d="30" onclick="setDays(30)">30 dias</button></div>
      <button class="btn" onclick="load()">↻ Atualizar</button>
    </div>
  </div>
  <section class="kpirow" id="kpis"></section>
  <div class="cmp">
    <div class="col-l">
      <div class="card"><h2>Pedidos por dia<span class="rt" id="ppdRange"></span></h2><div id="ppd"></div></div>
      <div class="g2">
        <div class="card"><h2>Entregas por motoboy<span class="rt">Top 7</span></h2><div id="bymoto"></div></div>
        <div class="card"><h2>Rotas por quantidade de pedidos</h2><div id="donut" style="display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap"></div></div>
      </div>
      <div class="card"><h2>Horário de maior gargalo</h2><div class="csub">Tempo médio total de entrega por horário (min)</div><div id="gargalo"></div></div>
      <div class="card"><h2>Atrasos por bairro</h2><div id="atrasos"></div></div>
    </div>
    <div class="col-r">
      <div class="card"><h2>Comparativo por loja</h2><div id="lojas"></div></div>
      <div class="card" style="margin-top:16px"><h2>Insights e alertas</h2><div id="insights"></div></div>
    </div>
  </div>
</template>

<script>window.PAGE='metricas';</script>
<script src="config.js" onerror="window.AUDENS_CONFIG=window.AUDENS_CONFIG||{}"></script>
<script src="app.js"></script>
<script>
const {api,setConn}=AudensShell;
const C={faint:'#6f6690',dim:'#a89ec6',text:'#eee9f7',violet:'#a855f7',violet2:'#7c3aed',violet3:'#c084fc',cyan:'#22d3ee',green:'#34d399',amber:'#f5b544',red:'#f2545b'};
let days=7, data=null;
function setDays(d){ days=d; document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on',Number(b.dataset.d)===d)); load(); }

const KIC={
  ordersPerDay:'<path d="M12 3 3 7.5v9L12 21l9-4.5v-9L12 3Z"/><path d="M3 7.5 12 12l9-4.5M12 12v9"/>',
  avgPrep:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  avgReadyOut:'<rect x="3" y="7" width="12" height="9" rx="1"/><path d="M15 10h4l3 3v3h-3"/><circle cx="7.5" cy="18" r="1.6"/><circle cx="17.5" cy="18" r="1.6"/>',
  avgTotal:'<path d="M5 12h14M12 5l7 7-7 7"/>',
  groupingRate:'<path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 12l9 5 9-5"/>',
  exceptionRate:'<path d="M12 3 2 20h20L12 3Z"/><path d="M12 10v4M12 17h.01"/>',
};
const KPI=[['ordersPerDay','Pedidos por dia'],['avgPrep','Tempo médio de preparo'],['avgReadyOut','Tempo médio pronto até saída'],['avgTotal','Tempo médio total de entrega'],['groupingRate','Taxa de agrupamento'],['exceptionRate','Exceções com 1 pedido']];
function fmtVal(k){ if(k.value==null)return '—'; if(k.unit==='min')return k.value+' min'; if(k.unit==='%')return k.value+'%'; return k.value; }
function deltaHTML(k,cls){
  if(k.delta==null)return `<span class="${cls} flat">—</span>`;
  const good=(k.delta<0&&k.goodDown)||(k.delta>0&&!k.goodDown);
  const bad=(k.delta>0&&k.goodDown)||(k.delta<0&&!k.goodDown);
  const dir=k.delta>0?'up':(k.delta<0?'down':'flat');
  const arrow=k.delta>0?'▲':(k.delta<0?'▼':'–');
  const color=k.delta===0?'flat':(good?'up':(bad?'down':'flat'));
  const suf=k.deltaPp?' p.p.':'%';
  return `<span class="${cls} ${color}">${arrow} ${(k.delta>0?'+':'')}${k.delta}${suf}</span>`;
}
function spark(vals,good){
  if(!vals||vals.length<2)return '';
  const color=good?C.green:C.violet3;
  const w=88,h=30,mx=Math.max(...vals),mn=Math.min(...vals),rng=(mx-mn)||1;
  const pts=vals.map((v,i)=>[i/(vals.length-1)*w, h-4-((v-mn)/rng)*(h-8)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return `<svg class="spk" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="none"><path d="${d} L ${w} ${h} L 0 ${h} Z" fill="${color}" opacity="0.12"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function renderKPIs(){
  const sk=data.sparklines||{};
  document.getElementById('kpis').innerHTML=KPI.map(([key,label])=>{
    const k=data.kpis[key]||{};
    const good=k.delta!=null&&((k.delta<0&&k.goodDown)||(k.delta>0&&!k.goodDown));
    return `<div class="kpi"><div class="top"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">${KIC[key]||''}</svg></span>${label}</div>
      <div class="val">${fmtVal(k)}</div>
      <div class="foot">${deltaHTML(k,'dl')}<span style="font-size:10px;color:var(--faint)">vs anterior</span>${spark(sk[key],good)}</div></div>`;
  }).join('');
}
function lineChart(series){
  if(!series||!series.length)return '<div class="empty">Sem dados no período.</div>';
  const w=680,h=250,pl=30,pr=14,pt=26,pb=30,iw=w-pl-pr,ih=h-pt-pb;
  const vals=series.map(s=>s.count),mx=Math.max(...vals,1);
  const X=i=>pl+(series.length>1?i/(series.length-1)*iw:iw/2), Y=v=>pt+ih-(v/mx)*ih;
  const pts=series.map((s,i)=>[X(i),Y(s.count)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${X(series.length-1).toFixed(1)} ${pt+ih} L ${X(0).toFixed(1)} ${pt+ih} Z`;
  let grid=''; for(let g=0;g<=3;g++){const gy=pt+ih-(g/3)*ih;grid+=`<line x1="${pl}" y1="${gy}" x2="${w-pr}" y2="${gy}" stroke="#271d40" stroke-width="1"/><text x="4" y="${gy+3}" fill="${C.faint}" font-size="9">${Math.round(g/3*mx)}</text>`;}
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${C.violet}"/><text x="${p[0].toFixed(1)}" y="${(p[1]-9).toFixed(1)}" fill="${C.dim}" font-size="10" font-weight="700" text-anchor="middle">${series[i].count}</text>`).join('');
  const step=Math.ceil(series.length/8);
  const labels=series.map((s,i)=>(i%step===0||i===series.length-1)?`<text x="${X(i).toFixed(1)}" y="${h-9}" fill="${C.faint}" font-size="9.5" text-anchor="middle">${s.day.slice(8)}/${s.day.slice(5,7)}</text>`:'').join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%"><defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${C.violet}" stop-opacity="0.35"/><stop offset="1" stop-color="${C.violet}" stop-opacity="0"/></linearGradient></defs>${grid}<path d="${area}" fill="url(#lg1)"/><path d="${line}" fill="none" stroke="${C.violet}" stroke-width="2.5" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}
function barChart(rows){
  if(!rows||!rows.length)return '<div class="empty">Sem entregas no período.</div>';
  const w=420,h=250,pl=16,pr=8,pt=22,pb=44,iw=w-pl-pr,ih=h-pt-pb;
  const mx=Math.max(...rows.map(r=>r.count),1),gap=iw/rows.length,bw=Math.min(gap*0.6,40);
  const bars=rows.map((r,i)=>{const bh=(r.count/mx)*ih,bx=pl+i*gap+(gap-bw)/2,by=pt+ih-bh;const nm=(r.name||'?').trim().split(' ')[0];
    return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,1).toFixed(1)}" rx="4" fill="url(#bg1)"/><text x="${(bx+bw/2).toFixed(1)}" y="${(by-6).toFixed(1)}" fill="${C.dim}" font-size="11" font-weight="800" text-anchor="middle">${r.count}</text><text x="${(bx+bw/2).toFixed(1)}" y="${h-24}" fill="${C.faint}" font-size="9.5" text-anchor="middle">${nm}</text>`;}).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%"><defs><linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${C.violet3}"/><stop offset="1" stop-color="${C.violet2}"/></linearGradient></defs>${bars}</svg>`;
}
function donutChart(rb){
  const box=document.getElementById('donut');
  const total=rb.total||0;
  if(!total){ box.innerHTML='<div class="empty">Sem rotas no período.</div>'; return; }
  const cx=100,cy=100,r=70,sw=26,c=2*Math.PI*r;
  const f2=rb.two/total,f3=rb.three/total;
  const seg=(frac,color,off)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${(frac*c).toFixed(1)} ${c.toFixed(1)}" stroke-dashoffset="${(-off*c).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
  const svg=`<svg viewBox="0 0 200 200" width="170" height="170">${seg(f2,C.violet2,0)}${seg(f3,C.cyan,f2)}<text x="100" y="98" fill="${C.text}" font-size="30" font-weight="800" text-anchor="middle">${Math.round(f2*100)}%</text><text x="100" y="120" fill="${C.faint}" font-size="11" text-anchor="middle">2 pedidos</text></svg>`;
  const leg=`<div class="legend"><div class="li"><span class="dot" style="background:${C.violet2}"></span><div><b>${Math.round(f2*100)}%</b> <span>(${rb.two} rotas)</span><div style="color:var(--dim);font-size:11px">2 pedidos</div></div></div><div class="li"><span class="dot" style="background:${C.cyan}"></span><div><b>${Math.round(f3*100)}%</b> <span>(${rb.three} rotas)</span><div style="color:var(--dim);font-size:11px">3 pedidos</div></div></div><div style="color:var(--faint);font-size:11px;margin-top:4px">Total: ${total} rotas</div></div>`;
  box.innerHTML=svg+leg;
}
function hourly(bt){
  if(!bt||!bt.every)return '<div class="empty">Sem dados.</div>';
  const has=bt.some(b=>b.avg>0); if(!has)return '<div class="empty">Sem entregas concluídas no período.</div>';
  const w=680,h=230,pl=26,pr=10,pt=34,pb=26,iw=w-pl-pr,ih=h-pt-pb;
  const mx=Math.max(...bt.map(b=>b.avg),1);
  const peak=bt.reduce((a,b)=>b.avg>a.avg?b:a,bt[0]);
  const gap=iw/24,bw=gap*0.62;
  const col=(v)=>{const t=v/mx;return t>0.8?C.red:t>0.55?C.amber:t>0.3?C.violet:C.violet2;};
  const bars=bt.map((b,i)=>{const bh=(b.avg/mx)*ih,bx=pl+i*gap+(gap-bw)/2,by=pt+ih-bh;const lb=(i%3===0)?`<text x="${(bx+bw/2).toFixed(1)}" y="${h-8}" fill="${C.faint}" font-size="9" text-anchor="middle">${String(i).padStart(2,'0')}h</text>`:'';return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,0).toFixed(1)}" rx="3" fill="${col(b.avg)}"/>${lb}`;}).join('');
  const px=pl+peak.hour*gap+gap/2;
  const pl2=Math.min(Math.max(px,34),w-34);
  const peakBox=peak.avg>0?`<rect x="${(pl2-32).toFixed(1)}" y="4" width="64" height="26" rx="6" fill="${C.red}"/><text x="${pl2.toFixed(1)}" y="15" fill="#fff" font-size="9" text-anchor="middle">Pico: ${String(peak.hour).padStart(2,'0')}h</text><text x="${pl2.toFixed(1)}" y="26" fill="#fff" font-size="10" font-weight="800" text-anchor="middle">${peak.avg} min</text>`:'';
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">${bars}${peakBox}</svg>`;
}
function atrasosTable(rows){
  if(!rows||!rows.length)return '<div class="empty">Sem atrasos no período. 🎉</div>';
  return `<table class="at"><thead><tr><th>Bairro</th><th class="r">Pedidos</th><th class="r">Atrasos</th><th class="r">% Atraso</th><th class="r">Atraso méd.</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.hood}</td><td class="r">${r.orders}</td><td class="r dl">${r.delays}</td><td class="r">${r.pct}%</td><td class="r">${r.avgDelay} min</td></tr>`).join('')}</tbody></table>`;
}
function dl2(delta,goodDown,pp){
  if(delta==null)return '';
  const good=(delta<0&&goodDown)||(delta>0&&!goodDown);
  const arrow=delta>0?'▲':(delta<0?'▼':'–');
  const cls=delta===0?'flat':(good?'up':'down');
  return `<span class="dl2 ${cls}">${arrow} ${(delta>0?'+':'')}${delta}${pp?' p.p.':'%'}</span>`;
}
function storeRow(label,value,delta,goodDown,pp){ return `<div class="mr"><span class="mk">${label}</span><span class="mv">${value} ${dl2(delta,goodDown,pp)}</span></div>`; }
function lojasHTML(list){
  if(!list||!list.length)return '<div class="empty">Nenhuma loja com dados.</div>';
  return list.map(s=>`<div class="store">
    <div class="sh"><div class="lg">${s.logoUrl?`<img src="${s.logoUrl}">`:''}</div><div><div class="nm">${s.name}</div><div class="ty">${s.type}</div>${s.active?'<div class="ac"><span class="d"></span>Ativo</div>':''}</div></div>
    ${storeRow('Pedidos',s.orders,s.ordersDelta,false,false)}
    ${storeRow('Tempo médio de preparo',s.avgPrep!=null?s.avgPrep+' min':'—',s.avgPrepDelta,true,false)}
    ${storeRow('Tempo médio de entrega',s.avgDeliv!=null?s.avgDeliv+' min':'—',s.avgDelivDelta,true,false)}
    ${storeRow('Taxa de agrupamento',s.groupingRate!=null?s.groupingRate+'%':'—',s.groupingDelta,false,true)}
    ${storeRow('Exceções com 1 pedido',s.exceptionRate!=null?s.exceptionRate+'%':'—',s.exceptionDelta,true,true)}
  </div>`).join('');
}
function insightsHTML(){
  const out=[];
  const worst=(data.delaysByHood||[]).filter(h=>h.delays>0)[0];
  if(worst)out.push(['red',C.red,'<path d="M12 3 2 20h20L12 3Z"/><path d="M12 10v4M12 17h.01"/>','Bairro com maior atraso',`${worst.hood} com ${worst.pct}% de pedidos atrasados (${worst.delays} de ${worst.orders}).`]);
  const best=(data.byDriver||[])[0];
  if(best)out.push(['green',C.green,'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6"/>','Motoboy com mais entregas',`${best.name} com ${best.count} entregas no período.`]);
  const t=data.kpis&&data.kpis.avgTotal, meta=data.deliveryTargetMin;
  if(t&&t.value!=null){ const over=t.value-meta;
    out.push([over>0?'amber':'green',over>0?C.amber:C.green,'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',over>0?'Tempo médio acima da meta':'Tempo médio dentro da meta',`Entrega média de ${t.value} min (meta: ${meta} min).`]);
  }
  if(!out.length)return '<div class="empty">Sem insights ainda.</div>';
  return out.map(i=>`<div class="ins"><div class="ii" style="background:${i[1]}22;color:${i[1]}"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8">${i[2]}</svg></div><div><div class="it">${i[3]}</div><div class="is">${i[4]}</div></div></div>`).join('');
}
function render(){
  if(!data)return;
  renderKPIs();
  document.getElementById('ppdRange').textContent=(days===7?'Últimos 7 dias':'Últimos 30 dias');
  document.getElementById('ppd').innerHTML=lineChart(data.ordersPerDaySeries);
  document.getElementById('bymoto').innerHTML=barChart(data.byDriver);
  donutChart(data.routesBySize||{two:0,three:0,total:0});
  document.getElementById('gargalo').innerHTML=hourly(data.bottleneck);
  document.getElementById('atrasos').innerHTML=atrasosTable(data.delaysByHood);
  document.getElementById('lojas').innerHTML=lojasHTML(data.byStore);
  document.getElementById('insights').innerHTML=insightsHTML();
}
async function load(){
  if(!api.hasBackend){setConn('err');return;}
  try{ data=await api.metrics(days); setConn('live'); }catch(e){ setConn('err'); }
  render();
}
load(); setInterval(load,20000);
</script>
</body>
</html>
