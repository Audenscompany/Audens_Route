<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0913" />
<link rel="stylesheet" href="styles.css" />
<title>Audens Route — Lojas</title>
<style>
  .addcard{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
  .store-item{margin-bottom:14px;}
  .store-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .logo-badge{width:46px;height:46px;border-radius:12px;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;border:1px solid var(--line);}
  .logo-badge img{width:100%;height:100%;object-fit:cover;} .logo-badge>span{width:100%;height:100%;display:block;}
  .logo-badge:hover::after{content:"trocar";position:absolute;inset:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center;}
  .store-head b{font-size:15px;} .store-head .tag{font-size:11px;color:var(--dim);background:var(--card2);padding:2px 9px;border-radius:999px;}
  .store-head .right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--dim);font-weight:600;}
  .sw{width:34px;height:20px;border-radius:999px;background:#3a3f4b;position:relative;transition:.2s;} .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;}
  .toggle.on .sw{background:var(--green);} .toggle.on .sw::after{left:16px;}
  .del{border:none;background:none;color:var(--faint);cursor:pointer;font-size:13px;} .del:hover{color:var(--red);}
  .wh label{font-size:11.5px;color:var(--faint);display:block;margin-bottom:5px;}
  .whrow{display:flex;gap:8px;} .whrow input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:9px 11px;font-size:12px;font-family:ui-monospace,monospace;}
  .copy{border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:8px;padding:0 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .hint{font-size:11.5px;color:var(--faint);margin-top:8px;}
</style>
</head>
<body>
<template id="page">
  <div class="page-head"><h1>Lojas & Cardápios</h1><p>Cadastre cada cardápio e cole a URL de webhook dele na plataforma. Todo pedido cai aqui, identificado.</p></div>
  <div class="card-b">
    <div class="addcard">
      <div class="field" style="flex:1;min-width:200px"><label>Nome do cardápio</label><input id="newName" placeholder="Ex.: Hamburgueria do Zé" /></div>
      <div class="field"><label>Tipo</label><select id="newType"><option value="hamburgueria">Hamburgueria</option><option value="pizzaria">Pizzaria</option><option value="restaurante">Restaurante</option><option value="outro">Outro</option></select></div>
      <button class="btn primary" id="addBtn">+ Adicionar cardápio</button>
    </div>
  </div>
  <div id="list"></div>
  <input type="file" id="logoInput" accept="image/*" style="display:none" />
</template>

<script>window.PAGE='lojas';</script>
<script src="config.js" onerror="window.AUDENS_CONFIG=window.AUDENS_CONFIG||{}"></script>
<script src="app.js"></script>
<script>
const {api,H,setConn,toast}=AudensShell;
let stores=[];
function colorFor(t){t=(t||'').toLowerCase();if(t.includes('hambur'))return '#f5b544';if(t.includes('pizz'))return '#e8632e';return '#7a869a';}

async function load(){
  if(!api.hasBackend){setConn('err');return;}
  try{ stores=await api.stores(); setConn('live'); render(); }catch(e){ setConn('err'); }
}
function render(){
  const box=document.getElementById('list');
  if(!stores.length){ box.innerHTML=`<div class="card-b" style="text-align:center;color:var(--faint)">Nenhum cardápio cadastrado ainda. Adicione o primeiro acima. 🍔🍕</div>`; return; }
  box.innerHTML=stores.map(s=>`
    <div class="card-b store-item">
      <div class="store-head">
        <div class="logo-badge" onclick="pickLogo('${s.id}')" title="Trocar logo">${s.logoUrl?`<img src="${s.logoUrl}">`:`<span style="background:${colorFor(s.type)}"></span>`}</div>
        <b>${s.name}</b><span class="tag">${s.type||'—'}</span>
        <span class="right"><span class="toggle ${s.active===false?'':'on'}" onclick="toggleActive('${s.id}',${s.active===false})"><span>${s.active===false?'Inativo':'Ativo'}</span><span class="sw"></span></span><button class="del" onclick="removeStore('${s.id}','${(s.name||'').replace(/'/g,'')}')">remover</button></span>
      </div>
      <div class="wh"><label>URL de webhook — cole na plataforma deste cardápio (POST)</label>
        <div class="whrow"><input readonly value="${api.webhookUrl(s)}" id="wh-${s.id}" /><button class="copy" onclick="copyWh('${s.id}')">Copiar</button></div>
        <div class="hint">Identificador: <b>${s.id}</b> · a chave no fim da URL autentica os pedidos deste cardápio.</div>
      </div>
    </div>`).join('');
}
async function addStore(){
  const name=document.getElementById('newName').value.trim(), type=document.getElementById('newType').value;
  if(!name){toast('Digite o nome do cardápio');return;}
  try{ await api.createStore({name,type}); document.getElementById('newName').value=''; toast('Cardápio adicionado'); load(); }catch(e){ toast('Erro: '+e.message); }
}
async function toggleActive(id,active){ try{ await api.patchStore(id,{active}); load(); }catch(e){ toast('Erro'); } }
async function removeStore(id,name){ if(!confirm(`Remover "${name}"? Os pedidos já recebidos continuam no sistema.`))return; try{ await api.delStore(id); toast('Removido'); load(); }catch(e){ toast('Erro'); } }
function copyWh(id){ const el=document.getElementById('wh-'+id); el.select(); el.setSelectionRange(0,99999); navigator.clipboard.writeText(el.value).then(()=>toast('URL copiada!')).catch(()=>toast('Selecionado — Ctrl/Cmd+C')); }

let logoTarget=null;
function pickLogo(id){ logoTarget=id; const i=document.getElementById('logoInput'); i.value=''; i.click(); }
function fileToDataUrl(file,size=112){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{const c=document.createElement('canvas');c.width=size;c.height=size;const x=c.getContext('2d');const sc=Math.max(size/img.width,size/img.height);const w=img.width*sc,h=img.height*sc;x.drawImage(img,(size-w)/2,(size-h)/2,w,h);URL.revokeObjectURL(u);res(c.toDataURL('image/png'));};img.onerror=rej;img.src=u;});}
document.addEventListener('change',async(e)=>{
  if(e.target.id!=='logoInput')return; const file=e.target.files[0]; if(!file||!logoTarget)return;
  try{ toast('Enviando logo…'); const d=await fileToDataUrl(file); await api.patchStore(logoTarget,{logoUrl:d}); toast('Logo atualizada'); load(); }catch(err){ toast('Erro ao enviar logo'); }
});
document.getElementById('addBtn').onclick=addStore;
document.getElementById('newName').addEventListener('keydown',e=>{if(e.key==='Enter')addStore();});
load();
</script>
</body>
</html>
