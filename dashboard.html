<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0913" />
<link rel="stylesheet" href="styles.css" />
<title>Audens Route — Dashboard</title>
</head>
<body>
<template id="page">
  <section class="accounts" id="accounts"></section>
  <section class="kpis" id="kpis"></section>
  <div class="grid2">
    <main class="board six" id="board"></main>
    <aside class="rail">
      <div class="panel"><div class="ph"><b>Fila de motoboys</b><a href="motoboys.html">ver</a></div><div id="fila"><div class="panel-empty">Nenhum motoboy online</div></div></div>
      <div class="panel"><div class="ph"><b>Alertas</b><span id="alertCount" style="margin-left:auto;font-size:11px;color:var(--faint)"></span></div><div id="alerts"><div class="panel-empty">Sem alertas</div></div></div>
    </aside>
  </div>
</template>

<script>window.PAGE='dashboard';</script>
<script src="config.js" onerror="window.AUDENS_CONFIG=window.AUDENS_CONFIG||{}"></script>
<script src="app.js"></script>
<script>
const {IC,LOGO,api,H,COLS,NEXT,setConn,toast}=AudensShell;
let stores=[],storeMap={},orders=[],queue=[],routes=[],settings={},drivers=[],pickForOrder=null;
function minsSince(iso){ if(!iso)return 0; return Math.floor((Date.now()-new Date(iso).getTime())/60000); }
function computeAlerts(){
  const a=[];
  const maxReady=Number(settings.maxReadyWaitingTimeMinutes)||10;
  const maxDeliv=Number(settings.defaultMaxDeliveryTimeMinutes)||60;
  orders.forEach(o=>{
    const num='#'+(o.displayId||o.externalOrderId||'');
    if(o.status==='waiting_grouping'&&!o.assignedRouteId){ const m=minsSince(o.readyAt||o.groupingStartedAt||o.createdAt); if(m>=maxReady)a.push({lvl:'warn',txt:`${num} pronto há ${m} min sem rota`}); }
    if(['sent_to_driver','accepted_by_driver','out_for_delivery'].includes(o.status)){ const m=minsSince(o.updatedAt); if(m>=maxDeliv)a.push({lvl:'red',txt:`${num} em entrega há ${m} min (atraso)`}); }
  });
  routes.forEach(r=>{ if(r.status==='sent_to_driver'){ const m=minsSince(r.assignedAt); if(m>=3)a.push({lvl:'warn',txt:`Rota ${(r.neighborhoods||[]).join(', ')||''} aguardando aceitação (${m} min)`}); } });
  return a.slice(0,12);
}
function renderRail(){
  const fila=document.getElementById('fila');
  fila.innerHTML=queue.length?queue.map((d,i)=>`<div class="q"><span class="pos">${i+1}</span><div class="av">${(d.name||'?').trim().charAt(0).toUpperCase()}</div><div><div class="nm">${d.name||''}</div></div><span class="eta" style="color:${d.isInsideStoreGeofence?'var(--green)':'var(--faint)'}">${d.isInsideStoreGeofence?'na loja':(d.distanceToStoreMeters!=null?d.distanceToStoreMeters+'m':'online')}</span></div>`).join(''):`<div class="panel-empty">Nenhum motoboy online</div>`;
  const al=computeAlerts();
  document.getElementById('alertCount').textContent=al.length?al.length:'';
  const el=document.getElementById('alerts');
  el.innerHTML=al.length?al.map(a=>`<div style="display:flex;gap:9px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #1c1830;font-size:12px"><span style="width:8px;height:8px;border-radius:50%;background:${a.lvl==='red'?'var(--red)':'var(--amber)'};margin-top:5px;flex-shrink:0"></span><span style="color:var(--dim)">${a.txt}</span></div>`).join(''):`<div class="panel-empty">Sem alertas · tudo em dia ✓</div>`;
}

function renderAccounts(){
  const lead=`<div class="lead"><b>Contas conectadas</b><span>${stores.length} conectada(s) · até 5</span></div>`;
  const cards=stores.map((s,i)=>`<div class="acct ${i===0?'sel':''}"><div class="lg">${H.storeBadge(s)}</div><div><div class="nm">${s.name}</div><div class="ty">Cardápio Web</div><div class="st">${s.active===false?'Inativo':'Ativo'}</div></div></div>`).join('');
  document.getElementById('accounts').innerHTML=lead+cards+`<a class="acct add" href="cardapios.html"><span class="plus">${IC.plus}</span>Conectar conta</a>`;
}
function renderKPIs(){
  const c=(sts)=>orders.filter(o=>sts.includes(o.status)).length;
  const K=[['inbox','rgba(96,165,250,.15)','#60a5fa',orders.length,'Pedidos ativos'],['chef','rgba(251,191,36,.15)','#fbbf24',c(['preparing']),'Em preparo'],['check','rgba(52,211,153,.15)','#34d399',c(['ready']),'Prontos'],['package','rgba(139,92,246,.15)','#a855f7',c(['waiting_grouping','grouped']),'Aguardando agrupamento'],['truck','rgba(34,211,238,.15)','#22d3ee',c(['waiting_driver','sent_to_driver','accepted_by_driver','out_for_delivery','arrived_at_customer']),'Em rota'],['thumb','rgba(52,211,153,.15)','#34d399',c(['delivered']),'Entregues']];
  document.getElementById('kpis').innerHTML=K.map(k=>`<div class="kpi"><div class="top"><div class="ic" style="background:${k[1]};color:${k[2]}">${IC[k[0]]}</div>${k[4]}</div><div class="num">${k[3]}</div><div class="foot">em tempo real</div></div>`).join('');
}
function cardHTML(o){
  const A=o.address||{};
  const bairro=A.neighborhood||(A.text?(A.text.length>30?A.text.slice(0,30)+'…':A.text):'')||'—';
  const nx=NEXT[o.status];
  const act=nx?`<button class="act" style="background:${nx[2]}" onclick="advance('${o.id}','${nx[0]}')">${nx[1]}</button>`:'';
  const deliv=o.status!=='delivered'?`<button class="act" style="background:none;border:1px solid var(--line);color:var(--dim);margin-top:6px" onclick="askDeliver('${o.id}')">🛵 entregue por motoboy</button>`:'';
  return `<div class="ocard"><div class="r1"><div class="lg">${H.logoFor(o,storeMap)}</div><div><div class="oid">Nº ${o.displayId||o.externalOrderId||''}</div><div class="store">${o.storeName||''}</div></div></div>
    <div class="bairro">${bairro}</div>
    <div class="r2"><span class="tm">${IC.clock} ${H.rel(o.readyAt||o.preparingAt||o.createdAt)}</span><span class="val">${H.money(o.total)}</span></div>${act}${deliv}</div>`;
}
function askDeliver(orderId){ pickForOrder=orderId; renderPicker(); }
function closePicker(){ pickForOrder=null; renderPicker(); }
function renderPicker(){
  let ov=document.getElementById('drvPick');
  if(!pickForOrder){ if(ov)ov.remove(); return; }
  const o=orders.find(x=>x.id===pickForOrder);
  const num=o?('Nº '+(o.displayId||o.externalOrderId||'')):'';
  if(!ov){ ov=document.createElement('div'); ov.id='drvPick'; document.body.appendChild(ov); }
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);display:grid;place-items:center;z-index:9999';
  const list=drivers.length?drivers.map(d=>`<button onclick="doDeliver('${d.id}')" style="display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;font-size:13.5px"><span style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#4b3b8f,#7c3aed);display:grid;place-items:center;font-weight:800">${(d.name||'?').trim().charAt(0).toUpperCase()}</span>${d.name||d.id}</button>`).join(''):'<div style="color:var(--faint);padding:10px">Nenhum motoboy cadastrado.</div>';
  ov.innerHTML=`<div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;width:min(360px,92vw)" onclick="event.stopPropagation()">
    <div style="font-size:15px;font-weight:800;margin-bottom:3px">Quem entregou o pedido ${num}?</div>
    <div style="font-size:12px;color:var(--faint);margin-bottom:14px">O pedido será marcado como entregue e contará no financeiro do motoboy.</div>
    ${list}
    <button onclick="closePicker()" style="width:100%;background:none;border:none;color:var(--faint);padding:8px;margin-top:4px;cursor:pointer;font-size:12.5px">cancelar</button>
  </div>`;
  ov.onclick=closePicker;
}
async function doDeliver(driverId){
  const orderId=pickForOrder; if(!orderId)return;
  try{ const r=await api.deliverManual(orderId,driverId); pickForOrder=null; renderPicker(); toast('Marcado como entregue por '+(r.driverName||'motoboy')); load(); }
  catch(e){ toast('Erro: '+e.message); }
}
function renderBoard(){
  document.getElementById('board').innerHTML=COLS.map(col=>{
    const items=orders.filter(o=>col.st.includes(o.status));
    const cards=items.length?items.map(cardHTML).join(''):`<div class="empty-col">sem pedidos</div>`;
    return `<div><div class="col-h"><span class="nm">${col.nm}</span><span class="ct">${items.length}</span></div><div class="col-body">${cards}</div></div>`;
  }).join('');
}
async function advance(id,to){try{await api.setStatus(id,to);load();}catch(e){AudensShell.toast('Erro: '+e.message);}}
async function load(){
  if(!api.hasBackend){setConn('err');renderAccounts();renderKPIs();renderBoard();return;}
  try{
    const [so,or_,qz,rt,cfg,dr]=await Promise.all([api.stores().catch(()=>[]),api.orders().catch(()=>[]),api.driverQueue().catch(()=>[]),api.allRoutes().catch(()=>[]),api.getSettings().catch(()=>({})),api.drivers().catch(()=>[])]);
    stores=Array.isArray(so)?so:[]; storeMap={}; stores.forEach(s=>storeMap[s.id]=s); orders=Array.isArray(or_)?or_:[];
    queue=Array.isArray(qz)?qz:[]; routes=Array.isArray(rt)?rt:[]; settings=cfg||{}; drivers=Array.isArray(dr)?dr:[];
    setConn('live');
  }catch(e){setConn('err');}
  renderAccounts();renderKPIs();renderBoard();renderRail();
}
load(); setInterval(load,5000);
</script>
</body>
</html>
